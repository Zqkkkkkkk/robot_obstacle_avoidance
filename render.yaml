services:
  - type: web
    name: robot-obstacle-avoidance
    runtime: python
    buildCommand: pip install .
    startCommand: python -m waitress --listen=0.0.0.0:$PORT robot_obstacle_avoidance.webapp:app
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
